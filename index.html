<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Múltiple - Selecciona tu Balotario</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 700px;
            width: 100%;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #667eea;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .balotarios-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .balotario-card {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 200px;
            border: 3px solid transparent;
        }

        .balotario-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .balotario-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .balotario-nombre {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .balotario-info {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 15px;
        }

        .balotario-preguntas {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.8em;
        }

        .select-btn {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 25px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s ease;
        }

        .select-btn:hover {
            background: #5a67d8;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .question-counter, .score {
            font-size: 1.1em;
            font-weight: bold;
            color: #764ba2;
        }

        .question-text {
            font-size: 1.5em;
            margin-bottom: 25px;
            color: #333;
            line-height: 1.4;
        }

        .answers {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .answer-btn {
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            font-size: 1em;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .answer-btn:hover:not(:disabled) {
            background: #e3e3e3;
            transform: translateX(5px);
        }

        .answer-btn.correct {
            background: #4caf50;
            border-color: #4caf50;
            color: white;
        }

        .answer-btn.incorrect {
            background: #f44336;
            border-color: #f44336;
            color: white;
        }

        .answer-btn.show-correct {
            background: #4caf50;
            border-color: #4caf50;
            color: white;
            opacity: 0.6;
        }

        .answer-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .next-btn {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease;
        }

        .next-btn:hover:not(:disabled) {
            background: #5a67d8;
        }

        .next-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .result {
            text-align: center;
            padding: 20px;
        }

        .result h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .result p {
            font-size: 1.5em;
            margin-bottom: 25px;
        }

        .result-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .result-stat {
            text-align: center;
            padding: 15px 25px;
            border-radius: 10px;
            background: #f5f5f5;
            min-width: 120px;
        }

        .result-stat .number {
            font-size: 2em;
            font-weight: bold;
        }

        .result-stat .label {
            font-size: 0.9em;
            color: #666;
        }

        .result-stat.correct-stat .number {
            color: #4caf50;
        }

        .result-stat.incorrect-stat .number {
            color: #f44336;
        }

        .result-stat.corregidas-stat .number {
            color: #FF9800;
        }

        .restart-btn {
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 25px;
            font-size: 1em;
            cursor: pointer;
            margin: 5px;
            transition: background 0.3s ease;
        }

        .restart-btn:hover {
            background: #5a3a7a;
        }

        .back-btn {
            background: #ff9800;
        }

        .back-btn:hover {
            background: #e68900;
        }

        .review-btn {
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 25px;
            font-size: 1em;
            cursor: pointer;
            margin: 5px;
            transition: background 0.3s ease;
        }

        .review-btn:hover {
            background: #1976D2;
        }

        .continue-btn {
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 25px;
            font-size: 1em;
            cursor: pointer;
            margin: 5px;
            transition: background 0.3s ease;
        }

        .continue-btn:hover {
            background: #388E3C;
        }

        .feedback {
            margin-top: 15px;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            border-radius: 8px;
        }

        .feedback.error {
            background: #ffebee;
            color: #c62828;
        }

        .feedback.success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .feedback.info {
            background: #e3f2fd;
            color: #1565c0;
        }

        .balotario-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .change-balotario-btn {
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .change-balotario-btn:hover {
            background: #e68900;
        }

        .badge-review {
            background: #2196F3;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-left: 10px;
        }

        .badge-block {
            background: #FF9800;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-left: 10px;
        }

        .block-result {
            background: #f5f5f5;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        .block-result h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .celebration {
            font-size: 3em;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .confetti {
            font-size: 2em;
            display: inline-block;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div id="content">
            <div class="loading">
                <div class="loader"></div>
                <p>Cargando balotarios...</p>
            </div>
        </div>
    </div>

    <script>
        // ========== CONFIGURACIÓN ==========
        const TAMANO_BLOQUE = 20;
        
        const BALOTARIOS = [
            {
                nombre: "Balotario - Administración",
                archivo: "balotario-adm.xlsx",
                icono: "📊",
                descripcion: "Preguntas de la especialidad de ADM"
            },
            {
                nombre: "Balotario - Cultura",
                archivo: "balotario-cultura2.xlsx",
                icono: "🎭",
                descripcion: "Historia universal y del Perú"
            }
            //{
                //nombre: "Balotario - Deberes",
                //archivo: "DEBERES.xlsx",
                //icono: "✍️",
                //descripcion: "Deberes"
            //},
            //{
                //nombre: " Balotario - Deberes 2",
                //archivo: "Deberes2.xlsx",
                //icono: "✍️",
                //descripcion: "Deberes 2"
            //},
            //{
                //nombre: " Balotario - Cultura 2",
                //archivo: "Cultura2.xlsx",
                //icono: "🎭",
                //descripcion: "Cultura 2"
            //}
        ];
        // ====================================
        
        let balotariosData = {};
        let balotarioActual = null;
        let todasLasPreguntas = [];
        let preguntasBloque = [];
        let preguntaActual = 0;
        let puntuacionBloque = 0;
        let puntuacionTotal = 0;
        let puntuacionRepaso = 0;
        let respuestaSeleccionada = false;
        let bloqueado = false;
        let preguntasIncorrectasBloque = [];
        let preguntasIncorrectasGlobales = [];
        let preguntasCorregidasEnRepaso = 0;
        let modoRepaso = false;
        let bloqueActual = 0;
        let totalBloques = 0;
        let preguntasRespondidas = new Set();

        // ========== FUNCIÓN PARA MEZCLAR ==========
        function mezclarArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // ========== DIVIDIR EN BLOQUES ==========
        function dividirEnBloques(preguntas) {
            const bloques = [];
            for (let i = 0; i < preguntas.length; i += TAMANO_BLOQUE) {
                bloques.push(preguntas.slice(i, i + TAMANO_BLOQUE));
            }
            return bloques;
        }

        async function cargarTodosLosBalotarios() {
            const container = document.getElementById('content');
            container.innerHTML = `
                <div class="loading">
                    <div class="loader"></div>
                    <p>Cargando ${BALOTARIOS.length} balotarios...</p>
                </div>
            `;

            let cargados = 0;
            
            for (const balotario of BALOTARIOS) {
                try {
                    console.log(`📥 Cargando: ${balotario.archivo}`);
                    const response = await fetch(balotario.archivo);
                    
                    if (!response.ok) {
                        throw new Error(`No se pudo cargar ${balotario.archivo}`);
                    }
                    
                    const arrayBuffer = await response.arrayBuffer();
                    const data = new Uint8Array(arrayBuffer);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const primeraHoja = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(primeraHoja, { header: 1 });
                    
                    const preguntasBalotario = procesarExcelData(rows, balotario.nombre);
                    
                    if (preguntasBalotario && preguntasBalotario.length > 0) {
                        balotariosData[balotario.archivo] = {
                            nombre: balotario.nombre,
                            preguntas: preguntasBalotario,
                            icono: balotario.icono,
                            descripcion: balotario.descripcion
                        };
                        cargados++;
                    }
                    
                } catch (error) {
                    console.error(`Error cargando ${balotario.nombre}:`, error);
                    balotariosData[balotario.archivo] = {
                        nombre: balotario.nombre,
                        error: true,
                        mensaje: error.message,
                        icono: balotario.icono,
                        descripcion: balotario.descripcion
                    };
                }
            }
            
            if (cargados > 0) {
                mostrarSeleccionBalotarios();
            } else {
                mostrarError("No se pudo cargar ningún balotario. Verifica que los archivos Excel existan.");
            }
        }

        function procesarExcelData(rows, nombreBalotario) {
            if (rows.length < 2) {
                console.warn(`${nombreBalotario}: No hay suficientes filas`);
                return null;
            }

            const encabezados = rows[0];
            
            const idxPregunta = encabezados.findIndex(h => 
                h && (h.toString().toLowerCase().includes('pregunta') || h.toString().toLowerCase().includes('preg')));
            const idxOpcionA = encabezados.findIndex(h => 
                h && (h.toString().toLowerCase().includes('opción a') || h.toString().toLowerCase().includes('opcion a') || h === 'A'));
            const idxOpcionB = encabezados.findIndex(h => 
                h && (h.toString().toLowerCase().includes('opción b') || h.toString().toLowerCase().includes('opcion b') || h === 'B'));
            const idxOpcionC = encabezados.findIndex(h => 
                h && (h.toString().toLowerCase().includes('opción c') || h.toString().toLowerCase().includes('opcion c') || h === 'C'));
            const idxOpcionD = encabezados.findIndex(h => 
                h && (h.toString().toLowerCase().includes('opción d') || h.toString().toLowerCase().includes('opcion d') || h === 'D'));
            const idxCorrecta = encabezados.findIndex(h => 
                h && (h.toString().toLowerCase().includes('correcta') || h.toString().toLowerCase().includes('correcto')));

            if (idxPregunta === -1 || idxCorrecta === -1) {
                console.warn(`${nombreBalotario}: Columnas requeridas no encontradas`);
                return null;
            }

            const nuevasPreguntas = [];
            for (let i = 1; i < rows.length; i++) {
                const fila = rows[i];
                if (!fila || !fila[idxPregunta]) continue;
                
                const opciones = [];
                if (idxOpcionA !== -1 && fila[idxOpcionA]) opciones.push(fila[idxOpcionA].toString());
                if (idxOpcionB !== -1 && fila[idxOpcionB]) opciones.push(fila[idxOpcionB].toString());
                if (idxOpcionC !== -1 && fila[idxOpcionC]) opciones.push(fila[idxOpcionC].toString());
                if (idxOpcionD !== -1 && fila[idxOpcionD]) opciones.push(fila[idxOpcionD].toString());
                
                let correctaTexto = fila[idxCorrecta]?.toString().trim().toUpperCase() || '';
                let indiceCorrecta = -1;
                
                if (correctaTexto === 'A') indiceCorrecta = 0;
                else if (correctaTexto === 'B') indiceCorrecta = 1;
                else if (correctaTexto === 'C') indiceCorrecta = 2;
                else if (correctaTexto === 'D') indiceCorrecta = 3;
                
                if (indiceCorrecta === -1 || indiceCorrecta >= opciones.length) {
                    continue;
                }
                
                nuevasPreguntas.push({
                    texto: fila[idxPregunta].toString(),
                    opciones: opciones,
                    correcta: indiceCorrecta,
                    id: i
                });
            }
            
            return nuevasPreguntas.length > 0 ? nuevasPreguntas : null;
        }

        function mostrarSeleccionBalotarios() {
            const container = document.getElementById('content');
            
            let html = `
                <h1>📚 Selecciona tu Balotario</h1>
                <div class="balotarios-container">
            `;
            
            for (const [archivo, data] of Object.entries(balotariosData)) {
                if (data.error) {
                    html += `
                        <div class="balotario-card" style="border-color: #f44336; opacity: 0.7;">
                            <div class="balotario-icon">⚠️</div>
                            <div class="balotario-nombre">${data.nombre}</div>
                            <div class="balotario-info">Error: No se pudo cargar</div>
                            <div class="balotario-preguntas" style="background: #f44336;">❌</div>
                        </div>
                    `;
                } else {
                    const totalPreg = data.preguntas.length;
                    const bloques = Math.ceil(totalPreg / TAMANO_BLOQUE);
                    html += `
                        <div class="balotario-card" onclick="seleccionarBalotario('${archivo}')">
                            <div class="balotario-icon">${data.icono}</div>
                            <div class="balotario-nombre">${data.nombre}</div>
                            <div class="balotario-info">${data.descripcion || ''}</div>
                            <div class="balotario-preguntas">📝 ${totalPreg} preguntas (${bloques} bloques de ${TAMANO_BLOQUE})</div>
                            <button class="select-btn">Seleccionar</button>
                        </div>
                    `;
                }
            }
            
            html += `
                </div>
                <div class="info" style="text-align: center; margin-top: 20px; color: #666;">
                    💡 Los balotarios se cargaron automáticamente. Selecciona uno para comenzar.
                </div>
            `;
            
            container.innerHTML = html;
        }

        function seleccionarBalotario(archivo) {
            const data = balotariosData[archivo];
            if (data.error) {
                alert(`No se puede seleccionar ${data.nombre} porque tiene errores.`);
                return;
            }
            
            balotarioActual = {
                archivo: archivo,
                nombre: data.nombre,
                icono: data.icono
            };
            
            const preguntasMezcladas = mezclarArray([...data.preguntas]);
            todasLasPreguntas = preguntasMezcladas;
            
            const bloques = dividirEnBloques(preguntasMezcladas);
            totalBloques = bloques.length;
            preguntasIncorrectasGlobales = [];
            puntuacionTotal = 0;
            bloqueActual = 0;
            
            iniciarBloque(bloques, 0);
        }

        function iniciarBloque(bloques, indiceBloque) {
            if (indiceBloque >= bloques.length) {
                mostrarResultadoFinal();
                return;
            }
            
            bloqueActual = indiceBloque;
            preguntasBloque = bloques[indiceBloque];
            preguntaActual = 0;
            puntuacionBloque = 0;
            puntuacionRepaso = 0;
            preguntasCorregidasEnRepaso = 0;
            respuestaSeleccionada = false;
            bloqueado = false;
            modoRepaso = false;
            preguntasIncorrectasBloque = [];
            preguntasRespondidas = new Set();
            
            renderizarPregunta();
        }

        function mostrarMenuBloque() {
            const container = document.getElementById('content');
            const correctasPrimera = puntuacionBloque;
            const incorrectasPendientes = preguntasIncorrectasBloque.length;
            const totalPreguntas = preguntasBloque.length;
            const corregidas = preguntasCorregidasEnRepaso;
            const progreso = ((bloqueActual + 1) / totalBloques * 100);
            const esPerfecto = correctasPrimera === totalPreguntas;
            // El total de preguntas resueltas correctamente es: correctas a la primera + corregidas en repaso
            const totalResueltas = correctasPrimera + corregidas;
            const todasCorregidas = corregidas > 0 && incorrectasPendientes === 0 && totalResueltas === totalPreguntas;
    
            // Porcentaje real: preguntas resueltas correctamente / total de preguntas
            const porcentajeReal = Math.round((totalResueltas / totalPreguntas) * 100);
            
            let html = `
                <div class="result">
                    <h1>📊 Bloque ${bloqueActual + 1} de ${totalBloques}</h1>
                    <div class="block-result">
                        <h3>📈 Resumen del Bloque</h3>
                        <div class="result-stats">
                            <div class="result-stat correct-stat">
                                <div class="number">${correctasPrimera}</div>
                                <div class="label">✅ Correctas a la primera</div>
                            </div>
                            <div class="result-stat corregidas-stat">
                                <div class="number">${corregidas}</div>
                                <div class="label">🔄 Corregidas en repaso</div>
                            </div>
                            <div class="result-stat incorrect-stat">
                                <div class="number">${incorrectasPendientes}</div>
                                <div class="label">❌ Incorrectas pendientes</div>
                            </div>
                            <div class="result-stat">
                                <div class="number">${Math.round(((correctasPrimera + corregidas) / totalPreguntas) * 100)}%</div>
                                <div class="label">📊 Progreso total</div>
                            </div>
                        </div>
            `;

            if (esPerfecto) {
                html += `
                    <div style="margin: 20px 0;">
                        <div style="font-size: 3em; animation: bounce 1s ease infinite;">🎉</div>
                        <h2 style="color: #4CAF50;">¡FELICIDADES!</h2>
                        <p style="font-size: 1.2em; color: #333;">¡Respondiste todas las preguntas correctamente a la primera!</p>
                        <div style="font-size: 2em; margin: 10px 0;">
                            <span style="display: inline-block; animation: spin 2s linear infinite;">🎊</span>
                            <span style="display: inline-block; animation: spin 2s linear infinite 0.5s;">✨</span>
                            <span style="display: inline-block; animation: spin 2s linear infinite 1s;">🎉</span>
                        </div>
                    </div>
                `;
            } else if (todasCorregidas && !esPerfecto) {
                html += `
                    <div style="margin: 20px 0;">
                        <div style="font-size: 2.5em;">🎯</div>
                        <h3 style="color: #4CAF50;">¡Buen trabajo!</h3>
                        <p style="font-size: 1.1em; color: #333;">¡Has corregido todas tus respuestas incorrectas!</p>
                    </div>
                `;
            }

            html += `
                        <div class="progress-bar">
                            <div class="fill" style="width: ${progreso}%"></div>
                        </div>
                        <p style="font-size: 0.9em; color: #666;">Progreso total: ${Math.round(progreso)}%</p>
                    </div>
            `;
            
            // Siempre mostrar el botón de repaso si hay incorrectas pendientes
            if (preguntasIncorrectasBloque.length > 0) {
                html += `
                    <button class="review-btn" onclick="iniciarRepasoBloque()">
                        📝 Repasar ${preguntasIncorrectasBloque.length} preguntas incorrectas
                    </button>
                    <br>
                `;
            }
            
            if (bloqueActual + 1 < totalBloques) {
                html += `
                    <button class="continue-btn" onclick="siguienteBloque()">
                        ➡️ Siguiente Bloque (${bloqueActual + 2} de ${totalBloques})
                    </button>
                    <br>
                `;
            } else {
                html += `
                    <button class="restart-btn" onclick="mostrarResultadoFinal()">
                        🏁 Ver Resultado Final
                    </button>
                    <br>
                `;
            }
            
            html += `
                    <button class="restart-btn back-btn" onclick="volverASeleccion()">
                        📚 Cambiar Balotario
                    </button>
                </div>
            `;
            
            container.innerHTML = html;
        }

        function iniciarRepasoBloque() {
            if (preguntasIncorrectasBloque.length === 0) {
                alert('🎉 ¡No tienes preguntas incorrectas en este bloque!');
                mostrarMenuBloque();
                return;
            }
            
            modoRepaso = true;
            preguntasBloque = mezclarArray([...preguntasIncorrectasBloque]);
            preguntaActual = 0;
            puntuacionRepaso = 0;
            respuestaSeleccionada = false;
            bloqueado = false;
            renderizarPregunta();
        }

        function siguienteBloque() {
            const bloques = dividirEnBloques(todasLasPreguntas);
            iniciarBloque(bloques, bloqueActual + 1);
        }

        function renderizarPregunta() {
            if (preguntaActual >= preguntasBloque.length) {
                mostrarMenuBloque();
                return;
            }

            const pregunta = preguntasBloque[preguntaActual];
            const container = document.getElementById('content');
            
            const badgeRepaso = modoRepaso ? '<span class="badge-review">📝 Repaso</span>' : '';
            const badgeBloque = `<span class="badge-block">Bloque ${bloqueActual + 1}/${totalBloques}</span>`;
            
            let contadorTexto = modoRepaso ? 
                `✅ Repaso: ${puntuacionRepaso}/${preguntasBloque.length}` : 
                `✅ Correctas a la primera: ${puntuacionBloque}`;
            
            let html = `
                <div class="balotario-header">
                    <h1>${balotarioActual.icono} ${balotarioActual.nombre}</h1>
                    <button class="change-balotario-btn" onclick="volverASeleccion()">
                        🔄 Cambiar
                    </button>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <span>${badgeBloque} ${badgeRepaso}</span>
                    <span style="font-size: 0.9em; color: #666;">${Math.round(((bloqueActual) / totalBloques) * 100)}% completado</span>
                </div>
                <div class="stats">
                    <span class="question-counter">Pregunta ${preguntaActual + 1} de ${preguntasBloque.length}</span>
                    <span class="score">${contadorTexto}</span>
                </div>
                <div class="question-text">${escapeHtml(pregunta.texto)}</div>
                <div class="answers">
            `;

            pregunta.opciones.forEach((opcion, index) => {
                const letra = String.fromCharCode(65 + index);
                html += `
                    <button class="answer-btn" data-index="${index}">
                        ${letra}. ${escapeHtml(opcion)}
                    </button>
                `;
            });

            html += `
                </div>
                <button class="next-btn" id="nextBtn" disabled>➡️ Siguiente pregunta</button>
                <div id="feedback" class="feedback"></div>
            `;

            container.innerHTML = html;
            respuestaSeleccionada = false;
            bloqueado = false;

            const answerBtns = document.querySelectorAll('.answer-btn');
            answerBtns.forEach(btn => {
                btn.addEventListener('click', () => seleccionarRespuesta(parseInt(btn.dataset.index)));
            });

            document.getElementById('nextBtn').disabled = true;
        }

        function volverASeleccion() {
            mostrarSeleccionBalotarios();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function seleccionarRespuesta(indiceSeleccionado) {
            if (bloqueado || respuestaSeleccionada) return;

            const pregunta = preguntasBloque[preguntaActual];
            const esCorrecta = (indiceSeleccionado === pregunta.correcta);
            const feedbackDiv = document.getElementById('feedback');
            const nextBtn = document.getElementById('nextBtn');
            const botones = document.querySelectorAll('.answer-btn');
            
            const esPrimeraVez = !preguntasRespondidas.has(pregunta.id);
            
            if (esCorrecta) {
                if (esPrimeraVez) {
                    puntuacionBloque++;
                    puntuacionTotal++;
                }
                
                if (modoRepaso) {
                    puntuacionRepaso++;
                    // Eliminar la pregunta de la lista de incorrectas del bloque
                    const index = preguntasIncorrectasBloque.findIndex(p => p.id === pregunta.id);
                    if (index !== -1) {
                        preguntasIncorrectasBloque.splice(index, 1);
                        preguntasCorregidasEnRepaso++;
                    }
                    // También eliminar de globales
                    const indexGlobal = preguntasIncorrectasGlobales.findIndex(p => p.id === pregunta.id);
                    if (indexGlobal !== -1) {
                        preguntasIncorrectasGlobales.splice(indexGlobal, 1);
                    }
                }
                
                preguntasRespondidas.add(pregunta.id);
                
                respuestaSeleccionada = true;
                bloqueado = true;
                
                botones[indiceSeleccionado].classList.add('correct');
                feedbackDiv.className = 'feedback success';
                feedbackDiv.textContent = '✅ ¡Correcto!';
                nextBtn.disabled = false;
                botones.forEach(btn => btn.disabled = true);
            } else {
                botones[indiceSeleccionado].classList.add('incorrect');
                
                if (esPrimeraVez) {
                    preguntasRespondidas.add(pregunta.id);
                    preguntasIncorrectasBloque.push({...pregunta});
                    
                    const yaExisteGlobal = preguntasIncorrectasGlobales.some(p => p.id === pregunta.id);
                    if (!yaExisteGlobal) {
                        preguntasIncorrectasGlobales.push({...pregunta});
                    }
                } else if (modoRepaso) {
                    // Si es en repaso y falla, volver a agregar a la lista de incorrectas
                    const yaExiste = preguntasIncorrectasBloque.some(p => p.id === pregunta.id);
                    if (!yaExiste) {
                        preguntasIncorrectasBloque.push({...pregunta});
                        // Si se vuelve a agregar, restar de corregidas
                        preguntasCorregidasEnRepaso--;
                    }
                    const yaExisteGlobal = preguntasIncorrectasGlobales.some(p => p.id === pregunta.id);
                    if (!yaExisteGlobal) {
                        preguntasIncorrectasGlobales.push({...pregunta});
                    }
                }
                
                if (modoRepaso) {
                    botones.forEach((btn, index) => {
                        if (index === pregunta.correcta) {
                            btn.classList.add('show-correct');
                        }
                    });
                    feedbackDiv.className = 'feedback error';
                    feedbackDiv.textContent = '❌ Incorrecto. La respuesta correcta es ' + 
                        String.fromCharCode(65 + pregunta.correcta) + '.';
                } else {
                    feedbackDiv.className = 'feedback error';
                    feedbackDiv.textContent = '❌ Incorrecto. Sigue intentando.';
                }
                
                if (modoRepaso) {
                    respuestaSeleccionada = true;
                    bloqueado = true;
                    nextBtn.disabled = false;
                    botones.forEach(btn => btn.disabled = true);
                } else {
                    nextBtn.disabled = true;
                    respuestaSeleccionada = false;
                }
            }
            
            const scoreSpan = document.querySelector('.score');
            if (scoreSpan) {
                if (modoRepaso) {
                    scoreSpan.textContent = `✅ Repaso: ${puntuacionRepaso}/${preguntasBloque.length}`;
                } else {
                    scoreSpan.textContent = `✅ Correctas a la primera: ${puntuacionBloque}`;
                }
            }
        }

        function siguientePregunta() {
            const nextBtn = document.getElementById('nextBtn');
            if (nextBtn.disabled) return;
            
            preguntaActual++;
            
            if (preguntaActual < preguntasBloque.length) {
                renderizarPregunta();
            } else {
                mostrarMenuBloque();
            }
        }

        function mostrarResultadoFinal() {
            const totalPreguntas = todasLasPreguntas.length;
            const porcentaje = (puntuacionTotal / totalPreguntas) * 100;
            
            let mensaje = "";
            if (porcentaje === 100) mensaje = "🏆 ¡Perfecto! ¡Respondiste todo a la primera!";
            else if (porcentaje >= 70) mensaje = "🎉 ¡Muy bien! Sigue así.";
            else if (porcentaje >= 50) mensaje = "👍 Está bien, puedes mejorar.";
            else mensaje = "📚 Sigue practicando, ¡lo lograrás!";
            
            const container = document.getElementById('content');
            let html = `
                <div class="result">
                    <h1>🏁 Resultado Final - ${balotarioActual.nombre}</h1>
                    <div class="result-stats">
                        <div class="result-stat correct-stat">
                            <div class="number">${puntuacionTotal}</div>
                            <div class="label">✅ Correctas a la primera</div>
                        </div>
                        <div class="result-stat incorrect-stat">
                            <div class="number">${preguntasIncorrectasGlobales.length}</div>
                            <div class="label">❌ Incorrectas pendientes</div>
                        </div>
                        <div class="result-stat">
                            <div class="number">${Math.round(porcentaje)}%</div>
                            <div class="label">📊 Porcentaje</div>
                        </div>
                    </div>
                    <p>${mensaje}</p>
                    <p style="font-size: 0.9em; color: #666;">${totalBloques} bloques de ${TAMANO_BLOQUE} preguntas</p>
            `;
            
            if (preguntasIncorrectasGlobales.length > 0) {
                html += `
                    <button class="review-btn" onclick="iniciarRepasoGlobal()">
                        📝 Repasar todas las ${preguntasIncorrectasGlobales.length} preguntas incorrectas
                    </button>
                    <br>
                `;
            }
            
            html += `
                    <button class="restart-btn" id="restartBtn">🔄 Reiniciar balotario</button>
                    <button class="restart-btn back-btn" id="backBtn">📚 Volver a seleccionar</button>
                </div>
            `;
            
            container.innerHTML = html;
            document.getElementById('restartBtn').addEventListener('click', () => {
                const data = balotariosData[balotarioActual.archivo];
                seleccionarBalotario(balotarioActual.archivo);
            });
            document.getElementById('backBtn').addEventListener('click', volverASeleccion);
        }

        function iniciarRepasoGlobal() {
            if (preguntasIncorrectasGlobales.length === 0) {
                alert('🎉 ¡No tienes preguntas incorrectas para repasar!');
                mostrarResultadoFinal();
                return;
            }
            
            modoRepaso = true;
            preguntasBloque = mezclarArray([...preguntasIncorrectasGlobales]);
            preguntaActual = 0;
            puntuacionRepaso = 0;
            respuestaSeleccionada = false;
            bloqueado = false;
            renderizarPregunta();
        }

        document.getElementById('content').addEventListener('click', (e) => {
            if (e.target.id === 'nextBtn') {
                siguientePregunta();
            }
        });

        window.seleccionarBalotario = seleccionarBalotario;
        window.volverASeleccion = volverASeleccion;
        window.iniciarRepasoBloque = iniciarRepasoBloque;
        window.iniciarRepasoGlobal = iniciarRepasoGlobal;
        window.siguienteBloque = siguienteBloque;
        window.mostrarResultadoFinal = mostrarResultadoFinal;

        cargarTodosLosBalotarios();
    </script>
</body>
</html>
